<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foursquare Exodus Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --red: #f14a2b; --purple: #800080; --chapter-accent: #006064; --chapter-border: #ffd700;
            --primary-gradient: linear-gradient(90deg, var(--red), var(--purple));
            --bg-color: #f0f2f5; --text-color: #1a1a1a; --card-bg: #ffffff; --border-color: #e0e0e0;
        }
        [data-theme="dark"] {
            --bg-color: #0f0f0f; --text-color: #ffffff; --card-bg: #1a1a1a; --border-color: #333; --chapter-accent: #00acc1;
        }
        * { box-sizing: border-box; transition: background 0.4s, color 0.4s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100vw; overflow-x: hidden; }
        #main-wrapper { width: 95%; max-width: 450px; position: relative; padding: 20px 0; }
        #quiz-container { width: 100%; padding: 2.5rem 2rem; background: var(--card-bg); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); text-align: center; position: relative; }
        .mode-switch { position: absolute; top: -20px; left: 0; cursor: pointer; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); font-size: 0.75rem; z-index: 100; font-weight: 600; }
        .header-logo { width: 70px; margin-bottom: 1rem; }
        .btn { background: var(--primary-gradient); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 110%; margin-top: 12px; font-size: 1rem; margin-left:-5%; }
        input { width: 110%; padding: 14px; margin: 10px 0; margin-left:-5%; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1rem; outline: none; }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .chapter-opt { background: var(--card-bg); border: 3px solid var(--chapter-border); color: var(--chapter-accent); padding: 18px; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 1.2rem; }
        .option { background: var(--bg-color); border: 2px solid transparent; padding: 14px; margin: 10px 0; border-radius: 14px; cursor: pointer; text-align: left; font-size: 0.9rem; font-weight: 500; width:110%; margin-left:-5%;}
        .option.correct { border-color: #2ecc71 !important; background: rgba(46, 204, 113, 0.1); }
        .option.wrong { border-color: #e74c3c !important; background: rgba(231, 76, 60, 0.1); }
        #explanation-modal { margin-top: 12px; padding: 15px; font-size: 0.85rem; border-left: 5px solid var(--red); background: rgba(241, 74, 43, 0.08); text-align: left; border-radius: 0 10px 10px 0; width:110%; margin-left:-5%;}
        .hidden { display: none !important; }
        #chapter-header { font-weight: 800; color: var(--red); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-size: 0.9rem; }
        .progress-bar-bg { height: 8px; background: var(--border-color); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-bar-fill { height: 100%; background: var(--primary-gradient); width: 0%; transition: width 0.4s; }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <button class="mode-switch" onclick="toggleTheme()">🌓 Mode</button>
        <div id="quiz-container">
            <div id="screen-welcome">

                <h2 style="color:var(--red); font-size: 1.2rem; margin: 5px 0;">Foursquare Exodus Quiz</h2>
                <p style="font-size: 0.7rem; line-height: 1.5; opacity: 0.8; padding: 0 15px;">
                    Test your biblical knowledge on Exodus Chapters 1-6. 20 real Bible questions per chapter.
                </p>
                <button class="btn" onclick="nextScreen('screen-info')">Start Quiz</button>
            </div>

            <div id="screen-info" class="hidden">
                <h2>Profile Details</h2>
                <input type="text" id="user-name" placeholder="Full Name">
                <input type="text" id="user-district" placeholder="District">
                <button class="btn" onclick="validateInfo()">Continue</button>
            </div>
 <div id="screen-chapters" class="hidden">
                <h2>Select Chapter</h2>
                <div class="chapter-grid" id="chapter-btns"></div>
            </div>

            <div id="screen-quiz" class="hidden">
                <div id="chapter-header"></div>
                <h3 id="question-text" style="margin-top: 5px; min-height: 60px;"></h3>
                <div id="options-container"></div>
                <div id="explanation-modal" class="hidden"></div>
                <button class="btn hidden" id="next-btn" onclick="nextQuestion()"></button>
                <div class="progress-bar-bg"><div id="progress-bar-fill" class="progress-bar-fill"></div></div>
                <p id="question-indicator" style="font-size: 0.8rem; margin-top: 8px; opacity: 0.7;"></p>
            </div>

            <div id="screen-result" class="hidden">
                <div id="result-card-wrap" style="padding: 10px;">
                    <div id="result-card" style="background:var(--primary-gradient); padding:35px 20px; color:white; border-radius:20px; text-align: center; position: relative;">
                        <img src="https://i.ibb.co/0HD9vg8/pngwing-com-1.png" style="width: 35px; filter: brightness(0) invert(1); margin-bottom: 10px;">
                        <div style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;">Foursquare Exodus Quiz</div>
                        <h2 id="res-name" style="margin: 15px 0 2px 0; font-size: 1.6rem;"></h2>
                        <div id="res-district" style="opacity: 0.9; font-size: 0.9rem; font-weight: 600; margin-bottom: 20px;"></div>
                        <div style="margin: 20px 0;">
                            <h1 id="score-percent" style="font-size: 4.5rem; margin: 0; line-height: 1;">0%</h1>
                            <div id="res-chapter-tag" style="font-size: 0.85rem; margin-top: 10px; font-weight: 600; background: rgba(255,255,255,0.2); display: inline-block; padding: 4px 12px; border-radius: 20px;"></div>
                        </div>
                        <p id="res-status" style="font-weight: 800; text-transform: uppercase; font-size: 0.9rem; border: 2px solid white; display: inline-block; padding: 10px 20px; border-radius: 10px; margin-top: 10px;"></p>
                    </div>
                </div>
                <button class="btn" onclick="showReview()">🔍 Review Answers</button>
                <button class="btn" onclick="downloadResult()" style="background:#333">💾 Save Scorecard</button>
                <button class="btn" onclick="location.reload()" style="background:gray">🔄 Main Menu</button>
            </div>

            <div id="screen-review" class="hidden">
                <h2>Review</h2>
                <div id="review-list" style="max-height: 400px; overflow-y: auto; text-align: left; padding-right: 5px;"></div>
                <button class="btn" onclick="nextScreen('screen-result')">Back to Score</button>
            </div>
        </div>
    </div>

                { q: "Did Pharaoh know the Lord?", options: ["No", "Yes", "Only by name", "He was a believer"], correct: "No", info: "Ex 5:2 - I know not the Lord." },
                { q: "Where were they to get straw?", options: ["Gather it themselves", "Buy it", "From Pharaoh", "From the Nile"], correct: "Gather it themselves", info: "Ex 5:12 - Scattered to gather stubble for straw." },
                { q: "What did they gather instead of straw?", options: ["Stubble", "Leaves", "Sand", "Wood"], correct: "Stubble", info: "Ex 5:12 - To gather stubble instead of straw." },
                { q: "Pharaoh said Moses and Aaron _____ the people from works?", options: ["Let (hinder)", "Help", "Teach", "Encourage"], correct: "Let (hinder)", info: "Ex 5:4 - Wherefore do ye let the people from their works?" },
                { q: "Taskmasters said: Fulfill your works, your daily _____?", options: ["Tasks", "Bricks", "Straw", "Songs"], correct: "Tasks", info: "Ex 5:13 - Fulfill your works, your daily tasks." },
                { q: "The officers met Moses and Aaron as they came from _____?", options: ["Pharaoh", "The field", "Midian", "Prayer"], correct: "Pharaoh", info: "Ex 5:20 - They met Moses and Aaron... as they came forth from Pharaoh." },
                { q: "Officers said Moses made their savour to be _____ in Pharaoh's eyes?", options: ["Abhorred", "Loved", "Sweet", "Forgotten"], correct: "Abhorred", info: "Ex 5:21 - Ye have made our savour to be abhorred." },
                { q: "Since Moses came to Pharaoh, has he delivered the people?", options: ["No", "Yes", "Partially", "In secret"], correct: "No", info: "Ex 5:23 - Neither hast thou delivered thy people at all." },
                { q: "The people were scattered throughout all the land of _____?", options: ["Egypt", "Goshen", "Canaan", "Midian"], correct: "Egypt", info: "Ex 5:12 - Scattered abroad throughout all the land of Egypt." },
                { q: "The taskmasters and officers were _____?", options: ["Hasty", "Kind", "Patient", "Lazy"], correct: "Hasty", info: "Ex 5:13 - And the taskmasters hasted them." },
                { q: "Who were the taskmasters?", options: ["Egyptians", "Israelites", "Midianites", "Pharaoh's sons"], correct: "Egyptians", info: "Ex 5:13-14 - Context: Egyptian taskmasters over Israelite officers." }
            ],
            6: [
                { q: "God said He appeared to Abraham by which name?", options: ["God Almighty", "Jehovah", "The Word", "Jesus"], correct: "God Almighty", info: "Ex 6:3 - By the name of God Almighty." },
                { q: "God said by which name was He NOT known to them?", options: ["Jehovah", "God Almighty", "The Creator", "Elohim"], correct: "Jehovah", info: "Ex 6:3 - By my name JEHOVAH was I not known." },
                { q: "God promised to bring them out from under _____?", options: ["Burdens", "Shadows", "Kings", "Clouds"], correct: "Burdens", info: "Ex 6:6 - Out from under the burdens of the Egyptians." },
                { q: "God promised to redeem them with a stretched out _____?", options: ["Arm", "Hand", "Rod", "Sword"], correct: "Arm", info: "Ex 6:6 - Redeem you with a stretched out arm." },
                { q: "God will take you to Me for a _____?", options: ["People", "Army", "Slave", "Worker"], correct: "People", info: "Ex 6:7 - I will take you to me for a people." },
                { q: "Why did the people not listen to Moses?", options: ["Anguish of spirit", "They were deaf", "They hated him", "They were busy"], correct: "Anguish of spirit", info: "Ex 6:9 - For anguish of spirit and cruel bondage." },
                { q: "Moses said he was of _____ lips?", options: ["Uncircumcised", "Stammering", "Slow", "Wicked"], correct: "Uncircumcised", info: "Ex 6:12 - Who am I of uncircumcised lips?" },
                { q: "How many years did Levi live?", options: ["137", "110", "120", "147"], correct: "137", info: "Ex 6:16 - The years of the life of Levi were 137." },
                { q: "Who was the father of Moses and Aaron?", options: ["Amram", "Izhar", "Hebron", "Uzziel"], correct: "Amram", info: "Ex 6:20 - Amram took him Jochebed... she bare Aaron and Moses." },
                { q: "Who was Moses' mother?", options: ["Jochebed", "Sarah", "Zipporah", "Miriam"], correct: "Jochebed", info: "Ex 6:20 - Amram took Jochebed his father's sister." },
                { q: "How many years did Amram live?", options: ["137", "120", "100", "110"], correct: "137", info: "Ex 6:20 - The years of Amram were 137." },
                { q: "Who was Aaron's wife?", options: ["Elisheba", "Zipporah", "Miriam", "Leah"], correct: "Elisheba", info: "Ex 6:23 - Aaron took Elisheba daughter of Amminadab." },
                { q: "Who was Aaron's firstborn son?", options: ["Nadab", "Abihu", "Eleazar", "Ithamar"], correct: "Nadab", info: "Ex 6:23 - She bare him Nadab, Abihu, Eleazar, Ithamar." },
                { q: "Who was the son of Eleazar?", options: ["Phinehas", "Nadab", "Korah", "Assir"], correct: "Phinehas", info: "Ex 6:25 - Eleazar's son was Phinehas." },
                { q: "God said He would bring Israel out by their _____?", options: ["Armies", "Ships", "Families", "Flocks"], correct: "Armies", info: "Ex 6:26 - Bring the children of Israel from Egypt by their armies." },
                { q: "Did God command Moses to speak ALL He said to Pharaoh?", options: ["Yes", "No", "Only some", "Eventually"], correct: "Yes", info: "Ex 6:29 - Speak thou unto Pharaoh... all that I say unto thee." },
                { q: "Moses repeated: Pharaoh shall not _____ unto me?", options: ["Hearken", "Look", "Give", "Bow"], correct: "Hearken", info: "Ex 6:30 - How shall Pharaoh hearken unto me?" },
                { q: "Who were the sons of Kohath?", options: ["Amram, Izhar, Hebron, Uzziel", "Nadab, Abihu", "Gershon, Merari", "Hanoch, Pallu"], correct: "Amram, Izhar, Hebron, Uzziel", info: "Ex 6:18 - Lists the sons of Kohath." },
                { q: "The Lord spoke to Moses and Aaron to bring them out of the land of _____?", options: ["Egypt", "Canaan", "Midian", "Goshen"], correct: "Egypt", info: "Ex 6:13 - Spoke to bring them out of the land of Egypt." },
                { q: "Was Jochebed Amram's father's sister?", options: ["Yes", "No", "Niece", "Cousin"], correct: "Yes", info: "Ex 6:20 - Amram took Jochebed his father's sister." }
            ]
        };

        let currentChapter, currentQ = 0, score = 0, userSelections = [];

        function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }
        
        function nextScreen(id) { 
            document.querySelectorAll('#quiz-container > div').forEach(d => d.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }

        function validateInfo() {
            if(document.getElementById('user-name').value && document.getElementById('user-district').value) { 
                setupChapters();
                nextScreen('screen-chapters'); 
            } else { alert("Please enter Name and District"); }
        }

        function setupChapters() {
            const grid = document.getElementById('chapter-btns');
            grid.innerHTML = '';
            for(let i=1; i<=6; i++) {
                let d = document.createElement('div'); d.className = 'chapter-opt'; d.innerText = i;
                d.onclick = () => { currentChapter = i; startQuiz(); };
                grid.appendChild(d);
            }
        }

        function startQuiz() { 
            currentQ = 0; score = 0; userSelections = []; 
            nextScreen('screen-quiz');
            loadQuestion(); 
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function loadQuestion() {
            const q = bibleData[currentChapter][currentQ];
            document.getElementById('chapter-header').innerText = `EXODUS CHAPTER ${currentChapter}`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container'); 
            container.innerHTML = '';
            document.getElementById('explanation-modal').classList.add('hidden');
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.add('hidden');
            nextBtn.innerText = (currentQ === 19) ? "Submit Quiz" : "Next Question";

            let opts = shuffle([...q.options]);
            opts.forEach(optText => {
                const btn = document.createElement('div'); btn.className = 'option'; btn.innerText = optText;
                btn.onclick = () => selectOption(optText, btn);
                container.appendChild(btn);
            });

            document.getElementById('progress-bar-fill').style.width = ((currentQ + 1) / 20 * 100) + '%';
            document.getElementById('question-indicator').innerText = `Question ${currentQ+1} of 20`;
        }

        function selectOption(txt, el) {
            const q = bibleData[currentChapter][currentQ];
            const isCorrect = (txt === q.correct);
            userSelections.push({ q: q.q, selected: txt, correct: q.correct, isCorrect });

            if(isCorrect) { 
                el.classList.add('correct'); score++; 
                correctSound.play();
            } else { 
                el.classList.add('wrong');
                wrongSound.play();
                Array.from(document.querySelectorAll('.option')).forEach(b => { if(b.innerText === q.correct) b.classList.add('correct'); });
            }

            document.getElementById('explanation-modal').innerText = q.info;
            document.getElementById('explanation-modal').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            document.querySelectorAll('.option').forEach(o => o.onclick = null);
        }

        function nextQuestion() {
            if(currentQ < 19) { currentQ++; loadQuestion(); } 
            else { showResult(); }
        }

        function showResult() {
            nextScreen('screen-result');
            const pct = Math.round((score/20)*100);
            document.getElementById('res-name').innerText = document.getElementById('user-name').value;
            document.getElementById('res-district').innerText = "District: " + document.getElementById('user-district').value;
            document.getElementById('res-chapter-tag').innerText = "Exodus Chapter " + currentChapter;
            document.getElementById('score-percent').innerText = pct + "%";
            
            let status = "";
            if(pct >= 90) status = "🔥 Biblical Scholar";
            else if(pct >= 70) status = "📖 Faithful Student";
            else if(pct >= 50) status = "🙏 Growing Disciple";
            else status = "🕯️ Keep Studying";
            
            document.getElementById('res-status').innerText = status;
            
            // CONFETTI
            if(pct >= 50) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        function showReview() {
            nextScreen('screen-review');
            const list = document.getElementById('review-list'); 
            list.innerHTML = '';
            userSelections.forEach((item, i) => {
                const div = document.createElement('div'); div.style.marginBottom = "15px"; div.style.padding = "10px"; div.style.borderBottom = "1px solid var(--border-color)";
                div.innerHTML = `<b>${i+1}. ${item.q}</b><br>
                <span style="color:${item.isCorrect ? '#2ecc71' : '#e74c3c'}">Your Answer: ${item.selected}</span><br>
                <span style="color:#2ecc71">Correct: ${item.correct}</span>`;
                list.appendChild(div);
            });
        }

        function downloadResult() {
            html2canvas(document.getElementById('result-card-wrap'), { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a'); link.download = 'Exodus_Quiz_Scorecard.png'; link.href = canvas.toDataURL(); link.click();
            });
        }
    </script>
</body>
